name: Accessibility Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  accessibility-test:
    name: "Verify Accessibility Text Exists"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium and UIAutomator2 driver
        run: |
          npm install -g appium@3.2.0
          appium driver install uiautomator2

      - name: Start Appium server
        run: appium --port 4723 &
        shell: bash

      - name: Write Firebase service account JSON
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > ./src/test/resources/firebase-service-account.json
        shell: bash

      - name: Download APK from Firebase App Distribution
        run: mvn compile exec:java -Dexec.mainClass="utils.FirebaseAppDistributionManager" -pl .
        shell: bash

      - name: Verify APK in app/ folder
        run: |
          echo "=== APK Verification ==="
          ls -lh app/*.apk
          echo "APK ready for testing"
        shell: bash

      - name: Enable KVM for Android emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Launch Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 32
          target: google_apis
          arch: x86_64
          profile: pixel_6
          avd-name: test_avd
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "Emulator started"

      - name: Run Accessibility Test
        run: |
          mvn test \
            -Dtest=AccessibilityTest#verifyAccessibilityTextExistsTest \
            -DforkCount=0 \
            -pl .
        continue-on-error: true

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-accessibility-test
          path: target/allure-results
          retention-days: 14
