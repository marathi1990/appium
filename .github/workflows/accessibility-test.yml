name: Regression1 Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  regression1:
    name: "Regression1 — API 30 Emulator + Firebase APK"
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium and UIAutomator2 driver
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Start Appium server
        run: appium --port 4723 --log-level info > /tmp/appium.log 2>&1 &

      - name: Write Firebase service account JSON
        env:
          FIREBASE_SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: echo "$FIREBASE_SA_JSON" > ./src/test/resources/firebase-service-account.json

      - name: Download APK from Firebase App Distribution
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: mvn compile exec:java -Dexec.mainClass="utils.FirebaseAppDistributionManager" -pl .

      - name: Run regression1 tagged tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_4
          avd-name: test_avd
          emulator-options: >-
            -no-snapshot-save
            -no-window
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim
            -camera-back none
          disable-animations: true
          script: mvn test -Dgroups=regression1 -DforkCount=0 -pl .
        env:
          APPIUM_DEVICE_NAME: emulator-5554
          APPIUM_PLATFORM_VERSION: "11"
          APPIUM_SERVER_URL: http://127.0.0.1:4723

      - name: Upload Appium logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: appium-log
          path: /tmp/appium.log
          retention-days: 7

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-regression1
          path: target/allure-results
          retention-days: 14

      - name: Generate Allure Report
        if: always()
        continue-on-error: true
        run: |
          npm install -g allure-commandline
          allure generate target/allure-results -o allure-report --clean

      - name: Upload Allure HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-html-report-regression1
          path: allure-report/
          retention-days: 14

      - name: Upload Surefire reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports-regression1
          path: target/surefire-reports
          retention-days: 14

      - name: Package report into ZIP
        if: always()
        run: |
          mkdir -p logs-archive
          cp -r allure-report/ logs-archive/allure-report 2>/dev/null || true
          cp -r target/surefire-reports/ logs-archive/test-reports 2>/dev/null || true
          [ -z "$(ls -A logs-archive)" ] && echo "No reports found" > logs-archive/INFO.txt
          cd logs-archive && zip -r ../regression1-report-${{ github.run_number }}.zip . -q

      - name: Check email secrets
        id: email-check
        if: always()
        run: |
          if [ -n "${{ secrets.GMAIL_USERNAME }}" ] && [ -n "${{ secrets.GMAIL_PASSWORD }}" ] && [ -n "${{ secrets.EMAIL_RECIPIENT }}" ]; then
            echo "ready=true" >> $GITHUB_OUTPUT
          else
            echo "ready=false" >> $GITHUB_OUTPUT
            echo "::warning::Email skipped — add GMAIL_USERNAME, GMAIL_PASSWORD, EMAIL_RECIPIENT in Settings → Secrets → Actions"
          fi

      - name: Send report via email
        if: always() && steps.email-check.outputs.ready == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_PASSWORD }}
          subject: "Regression1 Test Report - Run #${{ github.run_number }} - ${{ github.repository }}"
          to: ${{ secrets.EMAIL_RECIPIENT }}
          from: ${{ secrets.GMAIL_USERNAME }}
          body: |
            Regression1 test execution completed.

            Repository : ${{ github.repository }}
            Branch     : ${{ github.ref_name }}
            Trigger    : ${{ github.event_name }}
            Run        : #${{ github.run_number }}
            Author     : ${{ github.actor }}

            Download Allure Report:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            → Go to the link above → Artifacts section → download allure-html-report-regression1.zip
            → Extract and open allure-report/index.html in your browser.
