name: Accessibility Test

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  accessibility-test:
    name: "AccessibilityTest — API 30 Emulator + Git LFS APK"
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout with Git LFS ───────────────────────────────────────────
      - name: Checkout repository (with LFS)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull Git LFS files
        run: git lfs pull

      - name: Verify APK downloaded from LFS
        run: |
          echo "========================================"
          echo "  APK INSTALLED FOR THIS RUN"
          echo "========================================"
          APK_FILE=$(ls app/*.apk 2>/dev/null | head -1)
          if [ -z "$APK_FILE" ]; then
            echo "ERROR: No APK found in app/ folder!"
            exit 1
          fi
          APK_NAME=$(basename "$APK_FILE")
          APK_SIZE=$(du -sh "$APK_FILE" | cut -f1)
          APK_MD5=$(md5sum "$APK_FILE" | cut -d' ' -f1)
          echo "  Name : $APK_NAME"
          echo "  Path : $APK_FILE"
          echo "  Size : $APK_SIZE"
          echo "  MD5  : $APK_MD5"
          echo "========================================"
          echo "APK verification complete"

      # ── 2. Java 17 ─────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ── 3. Appium ──────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium and UIAutomator2 driver
        run: |
          npm install -g appium
          appium driver install uiautomator2
          echo "Appium version: $(appium --version)"

      # ── 4. KVM (hardware acceleration for emulator) ────────────────────────
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # ── 5. Appium server (background) ──────────────────────────────────────
      - name: Start Appium server
        run: |
          appium --port 4723 --log-level info > /tmp/appium.log 2>&1 &
          echo "Waiting for Appium to be ready..."
          sleep 5
          curl -s http://127.0.0.1:4723/status | grep -q '"ready"' \
            && echo "Appium is ready" \
            || echo "Warning: Appium status check inconclusive — continuing"
        shell: bash

      # ── 6. Write Firebase service account credentials ─────────────────────
      - name: Write Firebase service account JSON
        env:
          FIREBASE_SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$FIREBASE_SA_JSON" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT_JSON secret is not set."
            echo "Go to: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          echo "$FIREBASE_SA_JSON" > ./src/test/resources/firebase-service-account.json
          echo "Firebase service account written successfully."
        shell: bash

      # ── 7. Boot emulator + install APK + run test ──────────────────────────
      #
      #  android-emulator-runner starts the AVD, waits until it is fully booted,
      #  then runs the `script` block — so Appium + emulator are both ready when
      #  Maven launches the test.
      #
      - name: Run AccessibilityTest on Android emulator (API 30)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_4
          avd-name: test_avd
          emulator-options: >-
            -no-snapshot-save
            -no-window
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim
            -camera-back none
          disable-animations: true
          script: |
            echo "=== Emulator ready ==="
            adb devices
            adb shell getprop ro.build.version.release

            echo "=== Running AccessibilityTest ==="
            mvn test -Dtest=AccessibilityTest#verifyAccessibilityTextExistsTest -DforkCount=0 -pl .

            echo "=== Test complete ==="
        env:
          APPIUM_DEVICE_NAME: emulator-5554
          APPIUM_PLATFORM_VERSION: "11"
          APPIUM_SERVER_URL: http://127.0.0.1:4723

      # ── 8. Upload results ──────────────────────────────────────────────────
      - name: Upload Appium logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: appium-log
          path: /tmp/appium.log
          retention-days: 7

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-accessibility-test
          path: target/allure-results
          retention-days: 14

      - name: Generate Allure Report
        if: always()
        run: |
          npm install -g allure-commandline
          allure generate target/allure-results -o allure-report --clean

      - name: Upload Allure HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-html-report-accessibility
          path: allure-report/
          retention-days: 14

      - name: Upload Surefire reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports-accessibility-test
          path: target/surefire-reports
          retention-days: 14
