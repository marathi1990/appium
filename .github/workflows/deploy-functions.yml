name: Deploy Firebase Cloud Functions

# ─────────────────────────────────────────────────────────────────
# PURPOSE
# ─────────────────────────────────────────────────────────────────
# Deploys the Eventarc Cloud Function that listens for new
# Firebase App Distribution releases and fires a repository_dispatch
# to trigger firebase-tests.yml — replacing the polling approach.
#
# REQUIRED SECRETS
# ─────────────────────────────────────────────────────────────────
#   FIREBASE_SERVICE_ACCOUNT_JSON  – Google service account key JSON
#                                    (needs roles/cloudfunctions.developer
#                                     + roles/eventarc.admin
#                                     + roles/iam.serviceAccountUser)
#   FIREBASE_PROJECT_ID            – Your Firebase project ID
# ─────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
    paths:
      - 'functions/**'
      - 'firebase.json'
      - '.firebaserc'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Cloud Functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package.json

      - name: Install function dependencies
        run: npm install --prefix functions

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Cloud Functions
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          firebase deploy --only functions \
            --project "$FIREBASE_PROJECT_ID" \
            --force

      - name: Write job summary
        if: always()
        run: |
          echo "### Firebase Functions Deploy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Function | \`onNewAppDistributionBuild\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | \`google.firebase.appdistribution.release.v1.created\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Project | \`${{ secrets.FIREBASE_PROJECT_ID }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
