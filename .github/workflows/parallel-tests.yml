name: Dynamic Parallel Tests

# ─────────────────────────────────────────────────────────────────
# HOW TO USE
# ─────────────────────────────────────────────────────────────────
# Trigger manually from: Actions → Dynamic Parallel Tests → Run workflow
#
# Inputs:
#   tags     – JUnit 5 tag expression
#              Single tag  : smoke
#              Single tag  : regression1
#              OR  (either): smoke | regression1
#              AND  (both) : smoke & regression1
#   parallel – Number of parallel jobs (each gets its own emulator)
#              Tests are automatically split (sharded) across jobs.
# ─────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      tags:
        description: 'Tag filter (e.g. smoke  |  regression1  |  smoke | regression1)'
        required: true
        default: 'regression1'
        type: string
      parallel:
        description: 'Number of parallel jobs'
        required: true
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'

jobs:

  # ── Stage 1: Compile tests and generate the shard matrix ──────────
  setup:
    name: "Compile & Generate Shard Matrix"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compile test sources
        run: mvn test-compile -q

      - name: Discover test classes and assign shards
        id: gen
        run: |
          PARALLEL="${{ inputs.parallel }}"

          # Only look in tests/ package — excludes base.BaseTest and other non-test classes
          ALL_CLASSES=$(find target/test-classes/tests -name "*Test.class" \
            | grep -v '\$' | sort \
            | sed 's|target/test-classes/||' \
            | sed 's|\.class$||' \
            | sed 's|/|.|g')

          echo "Test classes found:"
          echo "$ALL_CLASSES"

          # Build shard list: each entry holds the comma-separated classes for that shard
          SHARDS=()
          for i in $(seq 1 "$PARALLEL"); do
            SHARD_CLASSES=$(echo "$ALL_CLASSES" | awk -v idx="$i" -v total="$PARALLEL" \
              'NR % total == (idx - 1) % total { printf "%s,", $0 }' \
              | sed 's/,$//')
            SHARDS+=("{\"shard\":$i,\"classes\":\"$SHARD_CLASSES\"}")
          done

          # -c produces compact (single-line) JSON — required for GITHUB_OUTPUT
          MATRIX_JSON=$(printf '%s\n' "${SHARDS[@]}" | jq -sc '{"include": .}')
          echo "matrix=$MATRIX_JSON" >> $GITHUB_OUTPUT
          echo "Generated matrix: $MATRIX_JSON"

  # ── Stage 2: Parallel test execution (one job per shard) ──────────
  test:
    name: "Shard ${{ matrix.shard }}/${{ inputs.parallel }} | tags=${{ inputs.tags }}"
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
      fail-fast: false   # other shards keep running if one fails

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium and UIAutomator2
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Start Appium server
        run: appium --port 4723 --log-level info > /tmp/appium.log 2>&1 &

      - name: Write Firebase service account JSON
        env:
          FIREBASE_SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: echo "$FIREBASE_SA_JSON" > ./src/test/resources/firebase-service-account.json

      - name: Download APK from Firebase App Distribution
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: mvn compile exec:java -Dexec.mainClass="utils.FirebaseAppDistributionManager" -pl .

      - name: Log shard assignment
        run: |
          echo "======================================"
          echo "  Shard ${{ matrix.shard }} / ${{ inputs.parallel }}"
          echo "  Tags   : ${{ inputs.tags }}"
          echo "  Classes: ${{ matrix.classes }}"
          echo "======================================"

      - name: Run tests (shard ${{ matrix.shard }})
        if: matrix.classes != ''
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_4
          avd-name: test_avd
          emulator-options: >-
            -no-snapshot-save -no-window -gpu swiftshader_indirect
            -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            mvn test \
              -Dtest="${{ matrix.classes }}" \
              -Dgroups="${{ inputs.tags }}" \
              -DforkCount=0 -pl .
        env:
          APPIUM_DEVICE_NAME: emulator-5554
          APPIUM_PLATFORM_VERSION: "11"
          APPIUM_SERVER_URL: http://127.0.0.1:4723
        continue-on-error: true

      - name: Upload Allure results (shard ${{ matrix.shard }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-shard-${{ matrix.shard }}
          path: target/allure-results
          retention-days: 14

  # ── Stage 3: Merge all shard results and send email ───────────────
  report:
    name: "Merge Results & Send Email"
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download all shard results
        if: always()
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-shard-*
          path: merged-allure-results
          merge-multiple: true

      - name: Generate merged Allure report
        if: always()
        continue-on-error: true
        run: |
          mkdir -p target/allure-results
          cp -r merged-allure-results/* target/allure-results/ 2>/dev/null || true
          npm install -g allure-commandline
          allure generate target/allure-results -o allure-report --clean

      - name: Package report into ZIP
        if: always()
        run: |
          mkdir -p logs-archive
          cp -r allure-report/ logs-archive/allure-report 2>/dev/null || true
          [ -z "$(ls -A logs-archive)" ] && echo "No reports" > logs-archive/INFO.txt
          cd logs-archive && zip -r ../parallel-report-${{ github.run_number }}.zip . -q

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parallel-allure-report
          path: allure-report/
          retention-days: 30

      - name: Send report via email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_PASSWORD }}
          subject: "Parallel Test Report [tags=${{ inputs.tags }}, shards=${{ inputs.parallel }}] - Run #${{ github.run_number }}"
          to: ${{ secrets.EMAIL_RECIPIENT }}
          from: ${{ secrets.GMAIL_USERNAME }}
          attachments: ${{ github.workspace }}/parallel-report-${{ github.run_number }}.zip
          body: |
            Parallel test execution completed.

            Tags      : ${{ inputs.tags }}
            Shards    : ${{ inputs.parallel }}
            Repository: ${{ github.repository }}
            Branch    : ${{ github.ref_name }}
            Run       : #${{ github.run_number }}
            Author    : ${{ github.actor }}

            Pipeline: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Attachment: parallel-report-${{ github.run_number }}.zip
            → Extract and open allure-report/index.html to view the full merged report.
