name: Dynamic Parallel Tests

# ─────────────────────────────────────────────────────────────────
# HOW TO USE
# ─────────────────────────────────────────────────────────────────
# Trigger: Actions → Dynamic Parallel Tests → Run workflow
#
#   tags     Comma-separated tags. Each tag gets its OWN runner + emulator.
#            Examples:
#              smoke                     → 1 runner  runs smoke tests
#              smoke,regression1         → 2 runners, each runs its tag
#              smoke,regression,regression1 → 3 runners
#            Prefix @ is stripped automatically (@smoke → smoke)
#
#   parallel Max concurrent runners (throttle). Default 5 = all at once.
#            If you pass 3 tags but set parallel=1, jobs queue one by one.
# ─────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      tags:
        description: 'Tags — comma-separated, each gets its own runner (e.g. smoke,regression1)'
        required: true
        default: 'regression1'
        type: string
      parallel:
        description: 'Max concurrent runners (throttle — default 5 = all at once)'
        required: false
        default: '5'
        type: choice
        options: ['1', '2', '3', '4', '5']

jobs:

  # ── Stage 1: Parse tags → one matrix entry per tag ───────────────
  setup:
    name: "Build Tag Matrix"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}

    steps:
      - name: Parse tags into matrix
        id: gen
        run: |
          TAGS="${{ inputs.tags }}"

          # Split by comma, trim whitespace, strip leading @ (e.g. @smoke → smoke)
          # Each tag becomes one independent parallel job
          MATRIX=$(echo "$TAGS" \
            | tr ',' '\n' \
            | sed 's/^[[:space:]]*//' \
            | sed 's/[[:space:]]*$//' \
            | sed 's/^@//' \
            | grep -v '^$' \
            | jq -Rsc 'split("\n") | map(select(length > 0)) | {"include": [.[] | {"tag": .}]}')

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "Matrix: $MATRIX"

  # ── Stage 2: One parallel job per tag (own runner + emulator) ────
  test:
    name: "Tag: ${{ matrix.tag }}"
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
      fail-fast: false
      max-parallel: ${{ fromJSON(inputs.parallel) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium and UIAutomator2
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Start Appium server
        run: appium --port 4723 --log-level info > /tmp/appium.log 2>&1 &

      - name: Write Firebase service account JSON
        env:
          FIREBASE_SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: echo "$FIREBASE_SA_JSON" > ./src/test/resources/firebase-service-account.json

      - name: Download APK from Firebase App Distribution
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: mvn compile exec:java -Dexec.mainClass="utils.FirebaseAppDistributionManager" -pl .

      - name: Run [${{ matrix.tag }}] tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_4
          avd-name: test_avd
          emulator-options: >-
            -no-snapshot-save -no-window -gpu swiftshader_indirect
            -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: mvn test -Dgroups="${{ matrix.tag }}" -DforkCount=0 -pl .
        env:
          APPIUM_DEVICE_NAME: emulator-5554
          APPIUM_PLATFORM_VERSION: "11"
          APPIUM_SERVER_URL: http://127.0.0.1:4723
        continue-on-error: true

      - name: Upload Allure results [${{ matrix.tag }}]
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.tag }}
          path: target/allure-results
          retention-days: 14

  # ── Stage 3: Merge all tag results and send email ─────────────────
  report:
    name: "Merge Results & Send Email"
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download all tag results
        if: always()
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: merged-allure-results
          merge-multiple: true

      - name: Generate merged Allure report
        if: always()
        continue-on-error: true
        run: |
          mkdir -p target/allure-results
          cp -r merged-allure-results/* target/allure-results/ 2>/dev/null || true
          npm install -g allure-commandline
          allure generate target/allure-results -o allure-report --clean

      - name: Package report into ZIP
        if: always()
        run: |
          mkdir -p logs-archive
          cp -r allure-report/ logs-archive/allure-report 2>/dev/null || true
          [ -z "$(ls -A logs-archive)" ] && echo "No reports" > logs-archive/INFO.txt
          cd logs-archive && zip -r ../parallel-report-${{ github.run_number }}.zip . -q

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parallel-allure-report
          path: allure-report/
          retention-days: 30

      - name: Generate PDF Report
        if: always()
        continue-on-error: true
        env:
          BUILD_VERSION: "tags:${{ inputs.tags }}"
        run: |
          npm install puppeteer-core --prefix /tmp/pdf-deps --no-save --loglevel error
          NODE_PATH=/tmp/pdf-deps/node_modules node .github/scripts/generate-pdf-report.js \
            target/allure-results test-report-${{ github.run_number }}.pdf

      - name: Check email secrets
        id: email-check
        if: always()
        run: |
          if [ -n "${{ secrets.GMAIL_USERNAME }}" ] && [ -n "${{ secrets.GMAIL_PASSWORD }}" ] && [ -n "${{ secrets.EMAIL_RECIPIENT }}" ]; then
            echo "ready=true" >> $GITHUB_OUTPUT
          else
            echo "ready=false" >> $GITHUB_OUTPUT
            echo "::warning::Email skipped — add GMAIL_USERNAME, GMAIL_PASSWORD, EMAIL_RECIPIENT in Settings → Secrets → Actions"
          fi

      - name: Send report via email
        if: always() && steps.email-check.outputs.ready == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_PASSWORD }}
          subject: "Parallel Test Report [tags=${{ inputs.tags }}] - Run #${{ github.run_number }}"
          to: ${{ secrets.EMAIL_RECIPIENT }}
          from: ${{ secrets.GMAIL_USERNAME }}
          attachments: test-report-${{ github.run_number }}.pdf
          html_body: file://test-report-${{ github.run_number }}.html
          body: |
            Parallel test execution completed.
            Tags      : ${{ inputs.tags }}
            Runners   : ${{ inputs.parallel }} max concurrent
            Repository: ${{ github.repository }}
            Branch    : ${{ github.ref_name }}
            Run       : #${{ github.run_number }}
            Author    : ${{ github.actor }}
            Full Allure Report: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
