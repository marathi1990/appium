name: Test & Email Allure Report

on:
  workflow_dispatch:

jobs:
  test-and-report:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Run Tests with Maven
      run: mvn clean test
      continue-on-error: true

    - name: Generate Allure Report
      run: mvn allure:report
      if: always()

    - name: Verify Allure Report Generated
      run: |
        echo "Checking for Allure report..."
        if [ -d "./target/site/allure-maven-plugin/" ]; then
          echo "✅ Allure report found!"
          ls -la ./target/site/allure-maven-plugin/
        else
          echo "⚠️  Allure report not found at expected location"
          echo "Searching for report directories..."
          find ./target -type d -name "*allure*" 2>/dev/null || echo "No allure directories found"
        fi
      shell: bash

    - name: Upload Allure Report as Artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-report
        path: ./target/site/allure-maven-plugin/
        retention-days: 30

    - name: Collect All Log Files
      if: always()
      run: |
        mkdir -p logs-archive
        cp -r ./target/site/allure-maven-plugin/ logs-archive/allure-report || true
        cp -r ./target/surefire-reports/ logs-archive/test-reports || true
        find . -name "*.log" -type f -exec cp {} logs-archive/ \; 2>/dev/null || true
        echo "Logs collected successfully"
        ls -lah logs-archive/

    - name: Create Logs Zip Archive
      if: always()
      run: |
        if [ -d "logs-archive" ] && [ "$(ls -A logs-archive)" ]; then
          cd logs-archive
          zip -r ../test-logs-${{ github.run_number }}.zip . -q
          cd ..
          echo "✅ ZIP archive created successfully"
          ls -lh test-logs-*.zip
        else
          echo "⚠️  No logs to archive"
          mkdir -p logs-archive
          echo "Report failed or incomplete" > logs-archive/ERROR.txt
          cd logs-archive
          zip -r ../test-logs-${{ github.run_number }}.zip . -q
          cd ..
        fi
      shell: bash

    - name: Prepare Report Summary
      if: always()
      run: |
        mkdir -p report-summary
        if [ -d "./target/site/allure-maven-plugin/" ]; then
          cp -r ./target/site/allure-maven-plugin/* report-summary/ || true
          echo "✅ Report prepared successfully"
        else
          echo "⚠️  Report directory not found"
          echo "Report generation may have failed" > report-summary/ERROR.txt
        fi

    - name: Extract Test Summary
      if: always()
      run: |
        if [ -f "./target/surefire-reports/index.xml" ]; then
          echo "TEST_SUMMARY=Found" >> $GITHUB_ENV
        else
          echo "TEST_SUMMARY=No tests run" >> $GITHUB_ENV
        fi
      shell: bash

    - name: Verify ZIP Archive
      if: always()
      run: |
        if [ -f "test-logs-${{ github.run_number }}.zip" ]; then
          echo "✅ ZIP file ready for email"
          ls -lh test-logs-${{ github.run_number }}.zip
        else
          echo "⚠️  ZIP file not found, creating minimal archive..."
          mkdir -p minimal-archive
          echo "Test run ${{ github.run_number }} - Report may be incomplete" > minimal-archive/INFO.txt
          cd minimal-archive
          zip -r ../test-logs-${{ github.run_number }}.zip . -q
          cd ..
        fi
      shell: bash

    - name: Generate PDF Report
      if: always()
      continue-on-error: true
      run: |
        npm install puppeteer-core --prefix /tmp/pdf-deps --no-save --loglevel error
        NODE_PATH=/tmp/pdf-deps/node_modules node .github/scripts/generate-pdf-report.js \
          target/allure-results test-report-${{ github.run_number }}.pdf

    - name: Check email secrets
      id: email-check
      if: always()
      run: |
        if [ -n "${{ secrets.GMAIL_USERNAME }}" ] && [ -n "${{ secrets.GMAIL_PASSWORD }}" ] && [ -n "${{ secrets.EMAIL_RECIPIENT }}" ]; then
          echo "ready=true" >> $GITHUB_OUTPUT
        else
          echo "ready=false" >> $GITHUB_OUTPUT
          echo "::warning::Email skipped — add GMAIL_USERNAME, GMAIL_PASSWORD, EMAIL_RECIPIENT in Settings → Secrets → Actions"
        fi

    - name: Send Allure Report via Email with Logs
      if: always() && steps.email-check.outputs.ready == 'true'
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        secure: true
        username: ${{ secrets.GMAIL_USERNAME }}
        password: ${{ secrets.GMAIL_PASSWORD }}
        subject: "Test Report - ${{ github.repository }} - Run #${{ github.run_number }}"
        to: ${{ secrets.EMAIL_RECIPIENT }}
        from: ${{ secrets.GMAIL_USERNAME }}
        attachments: test-report-${{ github.run_number }}.pdf
        body: |
          Test execution completed for branch: ${{ github.ref_name }}

          Repository: ${{ github.repository }}
          Branch    : ${{ github.ref_name }}
          Author    : ${{ github.actor }}
          Run       : #${{ github.run_number }}

          See attached PDF for the full test report with pass/fail summary and test case details.

          Full Allure Report (interactive HTML):
          ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          ---
          Automated Test Report System
