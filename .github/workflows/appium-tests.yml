name: Appium Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Maven cache
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Verify APK exists
      run: |
        if [ ! -f "Appium-JAVA/app/FluentHealth.apk" ]; then
          echo "ERROR: FluentHealth.apk not found in Appium-JAVA/app/"
          exit 1
        fi
        echo "✅ APK found: $(ls -lh Appium-JAVA/app/FluentHealth.apk)"

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Appium
      run: npm install -g appium
      
    - name: Install UIAutomator2 Driver
      run: appium driver install uiautomator2

    - name: Enable KVM
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-all
        sudo udevadm trigger --name-match=kvm

    - name: Start Android Emulator
      uses: ReactiveCircus/android-emulator-runner@v2
      with:
        api-level: 30
        target: default
        arch: x86_64
        profile: Nexus 5X
        script: |
          adb shell input keyevent 82  # Unlock emulator

    - name: Start Appium Server
      run: |
        appium --port 4723 > appium.log 2>&1 &
        sleep 5

    - name: Run Maven Tests
      run: mvn -B test
      working-directory: ./Appium-JAVA
      env:
        APPIUM_HOST: localhost
        APPIUM_PORT: 4723

    - name: Upload Test Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: Appium-JAVA/target/surefire-reports/

    - name: Upload Screenshots
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: screenshots
        path: Appium-JAVA/reports/screenshots/

    - name: Upload Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: appium-logs
        path: appium.log
