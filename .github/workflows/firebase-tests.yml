  # ─────────────────────────────────────────────────────────────────
  #  Report: Merge all results and send email
  # ─────────────────────────────────────────────────────────────────
  firebase-report:
    name: "Generate & Email Firebase Test Report"
    runs-on: ubuntu-latest
    needs: [ firebase-test-1, firebase-test-2, firebase-test-3, firebase-test-4, firebase-test-5 ]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Download all Allure results artifacts
        if: always()
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-firebase-test-*
          path: merged-allure-results
          merge-multiple: true

      - name: Copy merged results for report generation
        if: always()
        run: |
          mkdir -p target/allure-results
          cp -r merged-allure-results/* target/allure-results/ 2>/dev/null || true

      - name: Generate Allure Report
        if: always()
        continue-on-error: true
        run: |
          npm install -g allure-commandline
          allure generate target/allure-results -o allure-report --clean

      - name: Package report and results
        if: always()
        run: |
          mkdir -p logs-archive
          cp -r allure-report/ logs-archive/allure-report 2>/dev/null || true
          cp -r target/surefire-reports/ logs-archive/test-reports 2>/dev/null || true
          if [ ! "$(ls -A logs-archive 2>/dev/null)" ]; then
            echo "No reports found - creating placeholder" > logs-archive/INFO.txt
          fi
          cd logs-archive
          zip -r ../firebase-test-logs-${{ github.run_number }}.zip . -q
          cd ..
          echo "✅ ZIP created"
          ls -lh firebase-test-logs-*.zip

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firebase-allure-report
          path: allure-report/
          retention-days: 30

      - name: Send Firebase Test Report via Email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_PASSWORD }}
          subject: "🔥 Firebase Test Report [${{ github.event_name == 'repository_dispatch' && 'New Firebase Build' || github.event_name }}] - ${{ github.repository }} - Run #${{ github.run_number }}"
          to: ${{ secrets.EMAIL_RECIPIENT }}
          from: ${{ secrets.GMAIL_USERNAME }}
          attachments: ${{ github.workspace }}/firebase-test-logs-${{ github.run_number }}.zip
          body: |
            Hi,

            Firebase integration test execution completed.

            📋 EXECUTION DETAILS:
            ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            Repository: ${{ github.repository }}
            Trigger:    ${{ github.event_name == 'repository_dispatch' && 'New Firebase Build (auto-detected)' || github.event_name }}
            Branch:     ${{ github.ref_name }}
            ${{ github.event_name == 'repository_dispatch' && format('Firebase Build: v{0} (build {1})', github.event.client_payload.display_version, github.event.client_payload.build_version) || format('Commit: {0}', github.event.head_commit.message) }}
            Author:     ${{ github.actor }}
            Run:        #${{ github.run_number }}

            🔥 FIREBASE TESTS RUN:
            ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            Test 1: Verify user exists in Firebase Auth after login
            Test 2: Verify Firestore user profile document exists
            Test 3: Verify Basic Info email synced to Firestore after edit
            Test 4: Verify read-only fields match Firebase data
            Test 5: Verify custom Firebase Auth token creation

            🔗 LINKS:
            ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            CI/CD Pipeline: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            📦 ATTACHMENTS:
            ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            ✓ firebase-test-logs-${{ github.run_number }}.zip
              - Allure Report (HTML)
              - Test Reports (XML)

            HOW TO VIEW:
            1. Download the attached ZIP
            2. Extract to a folder
            3. Open allure-report/index.html in your browser

            ---
            Automated Firebase Test Report System
          html_body: |
            <html>
            <body style="font-family: Arial, sans-serif; color: #333;">
              <h2 style="color: #FF6F00;">🔥 Firebase Integration Test Report</h2>

              <div style="background-color: #f6f8fa; padding: 15px; border-radius: 6px; margin: 15px 0;">
                <h3>📋 Execution Details</h3>
                <table style="width: 100%; border-collapse: collapse;">
                  <tr style="border-bottom: 1px solid #e1e4e8;">
                    <td style="padding: 8px; font-weight: bold;">Repository:</td>
                    <td style="padding: 8px;">${{ github.repository }}</td>
                  </tr>
                  <tr style="border-bottom: 1px solid #e1e4e8;">
                    <td style="padding: 8px; font-weight: bold;">Trigger:</td>
                    <td style="padding: 8px;">${{ github.event_name == 'repository_dispatch' && 'New Firebase Build (auto-detected by monitor)' || github.event_name }}</td>
                  </tr>
                  <tr style="border-bottom: 1px solid #e1e4e8;">
                    <td style="padding: 8px; font-weight: bold;">Branch:</td>
                    <td style="padding: 8px;">${{ github.ref_name }}</td>
                  </tr>
                  ${{ github.event_name == 'repository_dispatch' && format('<tr style="border-bottom: 1px solid #e1e4e8;"><td style="padding: 8px; font-weight: bold;">Firebase Build:</td><td style="padding: 8px;">v{0} (build {1})</td></tr>', github.event.client_payload.display_version, github.event.client_payload.build_version) || '' }}
                  <tr style="border-bottom: 1px solid #e1e4e8;">
                    <td style="padding: 8px; font-weight: bold;">Run Number:</td>
                    <td style="padding: 8px;">#${{ github.run_number }}</td>
                  </tr>
                  <tr>
                    <td style="padding: 8px; font-weight: bold;">Author:</td>
                    <td style="padding: 8px;">${{ github.actor }}</td>
                  </tr>
                </table>
              </div>

              <div style="background-color: #fff3e0; padding: 15px; border-radius: 6px; margin: 15px 0; border-left: 4px solid #FF6F00;">
                <h3 style="margin-top: 0;">🔥 Firebase Tests</h3>
                <table style="width: 100%; border-collapse: collapse;">
                  <tr style="background: #f0f0f0;">
                    <th style="padding: 8px; text-align: left;">Test</th>
                    <th style="padding: 8px; text-align: left;">Description</th>
                  </tr>
                  <tr style="border-bottom: 1px solid #e1e4e8;">
                    <td style="padding: 8px;">Test 1</td>
                    <td style="padding: 8px;">Verify user exists in Firebase Auth after login</td>
                  </tr>
                  <tr style="border-bottom: 1px solid #e1e4e8;">
                    <td style="padding: 8px;">Test 2</td>
                    <td style="padding: 8px;">Verify Firestore user profile document exists</td>
                  </tr>
                  <tr style="border-bottom: 1px solid #e1e4e8;">
                    <td style="padding: 8px;">Test 3</td>
                    <td style="padding: 8px;">Verify Basic Info email synced to Firestore</td>
                  </tr>
                  <tr style="border-bottom: 1px solid #e1e4e8;">
                    <td style="padding: 8px;">Test 4</td>
                    <td style="padding: 8px;">Verify read-only fields match Firebase data</td>
                  </tr>
                  <tr>
                    <td style="padding: 8px;">Test 5</td>
                    <td style="padding: 8px;">Verify custom Firebase Auth token creation</td>
                  </tr>
                </table>
              </div>

              <div style="background-color: #e8f4f8; padding: 15px; border-radius: 6px; margin: 15px 0;">
                <h3>🚀 How to View the Report</h3>
                <ol>
                  <li>Download <code>firebase-test-logs-${{ github.run_number }}.zip</code></li>
                  <li>Extract the ZIP file</li>
                  <li>Open <code>allure-report/index.html</code> in your browser</li>
                </ol>
              </div>

              <div style="background-color: #f6f8fa; padding: 15px; border-radius: 6px; margin: 15px 0;">
                <h3>🔗 Quick Links</h3>
                <ul>
                  <li><a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View Full Workflow Run</a></li>
                  <li><a href="${{ github.server_url }}/${{ github.repository }}/actions">View All Runs</a></li>
