  # ─────────────────────────────────────────────────────────────────
  #  Report: Merge all results and send email
  #  Runs ALWAYS — even if all tests fail
  # ─────────────────────────────────────────────────────────────────
  firebase-report:
    name: "Generate & Email Firebase Test Report"
    runs-on: ubuntu-latest
    needs: [ firebase-test-1, firebase-test-2, firebase-test-3, firebase-test-4, firebase-test-5 ]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download all Allure results
        if: always()
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-firebase-test-*
          path: merged-allure-results
          merge-multiple: true

      - name: Generate Allure Report
        if: always()
        continue-on-error: true
        run: |
          mkdir -p target/allure-results
          cp -r merged-allure-results/* target/allure-results/ 2>/dev/null || true
          npm install -g allure-commandline
          allure generate target/allure-results -o allure-report --clean

      - name: Package report into ZIP
        if: always()
        run: |
          mkdir -p logs-archive
          cp -r allure-report/ logs-archive/allure-report 2>/dev/null || true
          cp -r target/surefire-reports/ logs-archive/test-reports 2>/dev/null || true
          [ -z "$(ls -A logs-archive)" ] && echo "No reports found" > logs-archive/INFO.txt
          cd logs-archive && zip -r ../firebase-test-logs-${{ github.run_number }}.zip . -q

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firebase-allure-report
          path: allure-report/
          retention-days: 30

      - name: Generate PDF Report
        if: always()
        continue-on-error: true
        run: |
          npm install puppeteer-core --prefix /tmp/pdf-deps --no-save --loglevel error
          NODE_PATH=/tmp/pdf-deps/node_modules node .github/scripts/generate-pdf-report.js \
            target/allure-results test-report-${{ github.run_number }}.pdf

      - name: Check email secrets
        id: email-check
        if: always()
        run: |
          if [ -n "${{ secrets.GMAIL_USERNAME }}" ] && [ -n "${{ secrets.GMAIL_PASSWORD }}" ] && [ -n "${{ secrets.EMAIL_RECIPIENT }}" ]; then
            echo "ready=true" >> $GITHUB_OUTPUT
          else
            echo "ready=false" >> $GITHUB_OUTPUT
            echo "::warning::Email skipped — add GMAIL_USERNAME, GMAIL_PASSWORD, EMAIL_RECIPIENT in Settings → Secrets → Actions"
          fi

      - name: Send report via email
        if: always() && steps.email-check.outputs.ready == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_PASSWORD }}
          subject: "Firebase Test Report - Run #${{ github.run_number }} - ${{ github.repository }}"
          to: ${{ secrets.EMAIL_RECIPIENT }}
          from: ${{ secrets.GMAIL_USERNAME }}
          attachments: test-report-${{ github.run_number }}.pdf
          html_body: file://test-report-${{ github.run_number }}.html
          body: |
            Firebase integration test execution completed.
            Repository : ${{ github.repository }}
            Trigger    : ${{ github.event_name }}
            Branch     : ${{ github.ref_name }}
            Run        : #${{ github.run_number }}
            Author     : ${{ github.actor }}
            Full Allure Report: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
