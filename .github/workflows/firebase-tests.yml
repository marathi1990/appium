name: Firebase Integration Tests

on:
  # ── Scenario 1: Code push / PR ──────────────────────────────────
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

  # ── Scenario 2: New Firebase build detected by the monitor ──────
  # Fired by firebase-build-monitor.yml via repository_dispatch when
  # a new APK appears in Firebase App Distribution (no commit needed).
  repository_dispatch:
    types: [ firebase-new-build ]

jobs:

  # ─────────────────────────────────────────────────────────────────
  #  Firebase Test 1: verifyUserExistsInFirebaseAuthAfterLogin
  # ─────────────────────────────────────────────────────────────────
  firebase-test-1:
    name: "Firebase Auth - User Exists After Login"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium and UIAutomator2 driver
        run: |
          npm install -g appium@3.2.0
          appium driver install uiautomator2

      - name: Enable KVM for Android emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Start Appium server
        run: |
          appium --port 4723 --log-level info > /tmp/appium.log 2>&1 &
          sleep 5
        shell: bash

      - name: Write Firebase service account JSON
        env:
          FIREBASE_SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$FIREBASE_SA_JSON" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT_JSON secret is not set."
            exit 1
          fi
          echo "$FIREBASE_SA_JSON" > ./src/test/resources/firebase-service-account.json
          echo "Firebase service account written successfully."
        shell: bash

      - name: Download APK from Firebase App Distribution
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: mvn compile exec:java -Dexec.mainClass="utils.FirebaseAppDistributionManager" -pl .

      - name: Launch Android emulator and run Firebase Test 1
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 32
          target: google_apis
          arch: x86_64
          profile: pixel_6
          avd-name: test_avd
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            echo "=== Emulator ready ==="
            adb devices
            echo "=== Running Firebase Test 1 ==="
            mvn test -Dtest=FirebaseTest#verifyUserExistsInFirebaseAuthAfterLogin -DforkCount=0 -pl .
        env:
          APPIUM_DEVICE_NAME: emulator-5554
          APPIUM_PLATFORM_VERSION: "12"
          APPIUM_SERVER_URL: http://127.0.0.1:4723
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
        continue-on-error: true

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-firebase-test-1
          path: target/allure-results
          retention-days: 14

